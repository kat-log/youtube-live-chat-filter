<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>
  </defs>

  <!-- 背景：枠全体を使う角丸四角形 -->
  <rect x="0" y="0" width="128" height="128" rx="22" ry="22" fill="url(#bgGrad)"/>

  <!-- 漏斗（ファネル）アイコン（白） -->
  <g fill="none" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <!-- 上部の横線（広い口） -->
    <line x1="22" y1="38" x2="106" y2="38"/>
    <!-- 左斜め線 -->
    <line x1="22" y1="38" x2="50" y2="68"/>
    <!-- 右斜め線 -->
    <line x1="106" y1="38" x2="78" y2="68"/>
    <!-- 筒の左 -->
    <line x1="50" y1="68" x2="50" y2="96"/>
    <!-- 筒の右 -->
    <line x1="78" y1="68" x2="78" y2="96"/>
    <!-- 底 -->
    <line x1="50" y1="96" x2="78" y2="96"/>
  </g>
</svg>
