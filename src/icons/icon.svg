<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- メインのブルーグラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>
    <!-- 微細なシャドウ -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0d47a1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- チャットバブル（角丸の吹き出し） -->
  <g filter="url(#shadow)">
    <!-- メインバブル -->
    <rect x="8" y="8" width="112" height="92" rx="20" ry="20" fill="url(#bgGrad)"/>
    <!-- 吹き出しのしっぽ（左下） -->
    <polygon points="24,96 20,118 48,92" fill="url(#bgGrad)"/>
  </g>

  <!-- フィルター/漏斗アイコン（白） -->
  <g fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 漏斗の上部（広い口） -->
    <line x1="30" y1="32" x2="98" y2="32"/>
    <!-- 漏斗の左斜め線 -->
    <line x1="30" y1="32" x2="54" y2="58"/>
    <!-- 漏斗の右斜め線 -->
    <line x1="98" y1="32" x2="74" y2="58"/>
    <!-- 漏斗の筒部分 -->
    <line x1="54" y1="58" x2="54" y2="80"/>
    <line x1="74" y1="58" x2="74" y2="80"/>
    <!-- 漏斗の底 -->
    <line x1="54" y1="80" x2="74" y2="80"/>
  </g>
</svg>
